<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#FF6600" />
    </linearGradient>
    
    <clipPath id="reveal">
      <rect x="40" y="0" width="0" height="400">
        <animate attributeName="width" values="0;760;760" keyTimes="0;0.7;1" dur="5s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117" rx="8" />
  
  <g stroke="#374151" stroke-width="1" stroke-dasharray="4 4">
    <line x1="60" y1="50" x2="750" y2="50" />
    <line x1="60" y1="150" x2="750" y2="150" />
    <line x1="60" y1="250" x2="750" y2="250" />
  </g>
  <line x1="60" y1="350" x2="750" y2="350" stroke="#374151" stroke-width="2" />

  <g font-family="Consolas, monospace" font-size="12" fill="#9CA3AF" text-anchor="end">
    <text x="50" y="55">$10B</text>
    <text x="50" y="155">$6.6B</text>
    <text x="50" y="255">$3.3B</text>
    <text x="50" y="355">$0</text>
  </g>

  <g font-family="Consolas, monospace" font-size="14" fill="#9CA3AF" text-anchor="middle">
    <text x="120" y="380">2026</text>
    <text x="260" y="380">2027</text>
    <text x="400" y="380">2028</text>
    <text x="540" y="380">2029</text>
    <text x="680" y="380">2030</text>
  </g>

  <g clip-path="url(#reveal)">
    <path d="M 120 305 L 260 290 L 400 215 L 540 140 L 680 50" fill="none" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    
    <g transform="translate(120, 305)">
      <circle r="6" fill="#10B981" />
      <text y="-15" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">IBM Food Trust</text>
      <text y="-30" fill="#10B981" font-family="Consolas, monospace" font-size="11" text-anchor="middle">$1.5B</text>
    </g>

    <g transform="translate(260, 290)">
      <circle r="6" fill="#10B981" />
      <text y="-15" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">VeChain</text>
      <text y="-30" fill="#10B981" font-family="Consolas, monospace" font-size="11" text-anchor="middle">$2.0B</text>
    </g>

    <g transform="translate(400, 215)">
      <circle r="6" fill="#F59E0B" />
      <text y="-15" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PoWV Scale-Up</text>
      <text y="-30" fill="#F59E0B" font-family="Consolas, monospace" font-size="11" text-anchor="middle">~$4.5B</text>
    </g>

    <g transform="translate(540, 140)">
      <circle r="6" fill="#FF6600" />
      <text y="-15" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Chainlink (Oracle Base)</text>
      <text y="-30" fill="#FF6600" font-family="Consolas, monospace" font-size="11" text-anchor="middle">$7.0B</text>
    </g>

    <g transform="translate(680, 50)">
      <circle r="8" fill="#FF6600" stroke="#fff" stroke-width="2" />
      <text y="-15" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">PoWV Target</text>
      <text y="-32" fill="#FF6600" font-family="Consolas, monospace" font-size="12" font-weight="bold" text-anchor="middle">$10B+</text>
    </g>
  </g>
</svg>
